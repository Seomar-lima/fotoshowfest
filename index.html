<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Foto Show Fest</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Foto Show Fest</h1>
  <h2>15 anos da Geovanna</h2>
  <!-- INÍCIO: BLOCO CORRIGIDO DA MOLDURA -->
  <div id="preview-container" style="position: relative; display: inline-block;">
    <video id="camera" autoplay playsinline style="width: 100%; border-radius: 15px;"></video>
    <img id="moldura" src="moldura-geovanna.png" alt="moldura"
         style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"/>
    <canvas id="canvas" style="display: none;"></canvas>
  </div>
  <!-- FIM: BLOCO CORRIGIDO DA MOLDURA -->
  <div class="controls">
    <button id="foto">📸 Tirar Foto</button>
    <button id="bumerangue">🎞️ Gravar Bumerangue</button>
    <div id="contador"></div>
  </div>
  <div class="qr-download" id="qrDownload"></div>
  <h3>Galeria de Fotos</h3>
  <div id="galeria" class="galeria"></div>
  <img src="galeria.png" alt="galeria" id="galeria-icon"/>
  <footer>© 2025 - Foto Show Fest</footer>
  <audio id="beep" src="beep.mp3" preload="auto"></audio>
  <script src="qrcode.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
